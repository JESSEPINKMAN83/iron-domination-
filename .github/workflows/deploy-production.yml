name: Deploy production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://throbbing-truth-af19.danireuven.workers.dev
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tests
        run: npm test

      - name: Prepare required Worker secrets
        run: |
          node -e "const fs=require('fs'); const required=['WIX_API_KEY','IRON_DOMINION_INGEST_SECRET']; for (const name of required) if (!process.env[name]) throw new Error(name+' is not configured in GitHub'); fs.writeFileSync(process.env.RUNNER_TEMP+'/worker-secrets.env', required.map((name)=>name+'='+JSON.stringify(process.env[name])).join('\n')+'\n', { mode: 0o600 });"
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          IRON_DOMINION_INGEST_SECRET: ${{ secrets.IRON_DOMINION_INGEST_SECRET }}

      - name: Build Cloudflare bundle
        run: npm run build:cloudflare

      - name: Deploy Cloudflare Worker
        run: npx wrangler@4.112.0 deploy --strict --secrets-file "$RUNNER_TEMP/worker-secrets.env"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
