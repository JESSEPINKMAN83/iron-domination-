services:
  - type: web
    name: iron-dominion-relay
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run multiplayer
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RECONNECT_GRACE_MS
        value: '60000'
      - key: MAX_COMMANDS_PER_SECOND
        value: '180'
